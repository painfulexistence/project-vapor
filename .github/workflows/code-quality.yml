name: Code Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────
  # Format check — fast, no build required.
  # Fails the PR if any file would be changed by clang-format.
  # Run  python3 scripts/run_code_check.py  locally to auto-fix.
  # ──────────────────────────────────────────────────────────────
  format-check:
    name: clang-format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format 18
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update -qq
          sudo apt-get install -y clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/bin/clang-format

      # TEMPORARY: non-blocking until the pre-existing formatting drift is
      # cleaned up in a dedicated bulk-reformat commit. Failures still show
      # in the job log; remove continue-on-error to make this gate again.
      - name: Check formatting
        continue-on-error: true
        run: python3 scripts/run_code_check.py --check
