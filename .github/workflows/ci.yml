name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Unit tests (no GPU required) ─────────────────────────────────────────
  test:
    name: Unit Tests (macOS / Clang)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # vcpkg is a submodule

      - name: Install system dependencies
        run: |
          brew install ninja ccache glslang

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-macos-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-${{ github.ref_name }}-
            ccache-macos-

      - name: Configure (vcpkg + Ninja)
        run: |
          cmake --preset ninja-local-vcpkg \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build tests only
        run: |
          cmake --build build --config Release \
            --target test_action_system test_scene_transform test_camera test_physics test_asset_management test_resource_manager test_backend_support test_ui_system \
            -- -j$(sysctl -n hw.logicalcpu)

      - name: Run tests
        working-directory: build
        run: ctest -C Release --output-on-failure --timeout 60 -j$(sysctl -n hw.logicalcpu)

      - name: Print ccache stats
        run: ccache --show-stats

  # ── Multi-OS Build ───────────────────────────────────────────────────────
  build:
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        build-type: [Debug, Release, MinSizeRel]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - uses: rlalik/setup-cpp-compiler@master
        with:
          compiler: latest

      - uses: seanmiddleditch/gha-setup-ninja@master

      # WORKAROUND: Install Vcpkg (submodule seems not working?)
      - uses: actions/checkout@v4
        with:
          repository: 'microsoft/vcpkg'
          path: 'vcpkg'

      - name: Set strings
        id: strings
        run: |
          echo "build-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Bootstrap vcpkg
        run: |
          ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh
        shell: bash

      - name: Install CMake and other dependencies on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libxmu-dev libxi-dev libgl-dev libxinerama-dev libxcursor-dev xorg-dev libglu1-mesa-dev pkg-config

      - name: Install CMake on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake

      - name: CMake Configure
        run: >
          cmake -G Ninja
          -B ${{ steps.strings.outputs.build-dir }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}
          -S ${{ github.workspace }}

      - name: CMake Build
        run: cmake --build ${{ steps.strings.outputs.build-dir }}
